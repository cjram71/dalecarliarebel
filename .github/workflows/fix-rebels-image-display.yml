name: Fix Rebels image display

on:
  push:
    branches:
      - main
    paths:
      - .image-fix/ready

permissions:
  contents: write

jobs:
  fix-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Validate image assets and apply responsive display rules
        shell: python
        run: |
          from pathlib import Path
          import re

          logo = Path('assets/rebels-logo-small.webp')
          hero = Path('assets/rebels-game-small.webp')
          for asset in (logo, hero):
              data = asset.read_bytes()
              if data[:4] != b'RIFF' or data[8:12] != b'WEBP':
                  raise SystemExit(f'{asset} is not a valid WebP image')

          pages = list(Path('.').glob('*.html'))
          logo_pages = [p for p in pages if 'assets/rebels-logo-small.webp' in p.read_text(encoding='utf-8')]
          hero_pages = [p for p in pages if 'assets/rebels-game-small.webp' in p.read_text(encoding='utf-8')]
          if not logo_pages:
              raise SystemExit('No pages reference the shared Rebels logo')
          if not hero_pages:
              raise SystemExit('No pages reference the shared Rebels hero image')

          marker_start = '/* REBELS IMAGE DISPLAY FIX START */'
          marker_end = '/* REBELS IMAGE DISPLAY FIX END */'
          css = Path('styles.css').read_text(encoding='utf-8')
          css = re.sub(
              re.escape(marker_start) + r'.*?' + re.escape(marker_end),
              '',
              css,
              flags=re.S,
          ).rstrip()

          fix = r'''

/* REBELS IMAGE DISPLAY FIX START */
/* Keep the official crest at its natural proportions everywhere it appears. */
.brand img {
  width: auto !important;
  height: 3.75rem !important;
  max-width: 8rem !important;
  object-fit: contain !important;
  object-position: center !important;
  flex: 0 0 auto;
}

.footer-brand img {
  width: min(15rem, 72vw) !important;
  height: auto !important;
  max-width: 100% !important;
}

/* Show the supplied game photograph without stretching or accidental cropping. */
.hero-photo {
  position: relative;
  margin: 0;
  overflow: hidden;
}

.hero-photo > img,
.page-team-photo {
  display: block;
  width: 100% !important;
  height: auto !important;
  max-height: 44rem;
  aspect-ratio: 960 / 732;
  object-fit: cover !important;
  object-position: 50% 45% !important;
}

.hero-logo-card img {
  width: min(12rem, 42vw) !important;
  height: auto !important;
  max-width: 100% !important;
  object-fit: contain !important;
}

@media (max-width: 720px) {
  .brand img {
    height: 3.15rem !important;
    max-width: 6.5rem !important;
  }

  .hero-photo > img,
  .page-team-photo {
    max-height: none;
    object-position: 50% 42% !important;
  }
}
/* REBELS IMAGE DISPLAY FIX END */
'''
          Path('styles.css').write_text(css + fix, encoding='utf-8')
          print(f'Logo shared by {len(logo_pages)} page(s); hero shared by {len(hero_pages)} page(s).')

      - name: Commit the site-wide correction
        shell: bash
        run: |
          rm -rf .image-fix
          rm -f .github/workflows/fix-rebels-image-display.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add styles.css .image-fix .github/workflows/fix-rebels-image-display.yml
          git commit -m "Fix logo proportions and hero image display site-wide"
          git push origin HEAD:main
