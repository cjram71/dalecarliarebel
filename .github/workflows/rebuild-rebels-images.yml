name: Rebuild Rebels image assets

on:
  push:
    branches:
      - fix-valid-rebels-images
    paths:
      - .image-build/trigger

permissions:
  contents: write

jobs:
  rebuild-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: fix-valid-rebels-images

      - name: Decode valid WebP assets
        shell: bash
        run: |
          cat .image-build/logo/part-* | base64 --decode > assets/rebels-logo-small.webp
          cat .image-build/game/part-* | base64 --decode > assets/rebels-game-small.webp
          test "$(head -c 4 assets/rebels-logo-small.webp)" = "RIFF"
          test "$(dd if=assets/rebels-logo-small.webp bs=1 skip=8 count=4 status=none)" = "WEBP"
          test "$(head -c 4 assets/rebels-game-small.webp)" = "RIFF"
          test "$(dd if=assets/rebels-game-small.webp bs=1 skip=8 count=4 status=none)" = "WEBP"

      - name: Commit rebuilt assets
        shell: bash
        run: |
          rm -rf .image-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/rebels-logo-small.webp assets/rebels-game-small.webp .image-build
          git commit -m "Replace corrupted Rebels image assets"
          git push origin HEAD:fix-valid-rebels-images
